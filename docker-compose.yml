services:
  db:
    image: postgres:18
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db-data:/var/lib/postgresql
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
  front:
    image: front
    build:
      context: ./client
    ports:
      - "3000:3000"
    depends_on:
      - db
  backend:
    image: backend
    build:
      context: ./api
    ports:
      - "4000:4000"
      - "5555:5555"
    depends_on:
      - db
      - front
    volumes:
      - upload-vol:/app/uploads
     

volumes:
  db-data:
  upload-vol: